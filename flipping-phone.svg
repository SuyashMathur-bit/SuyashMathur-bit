<svg fill="none" viewBox="0 0 900 450" width="900" height="450" xmlns="http://www.w3.org/2000/xhtml">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes ultraFlip {
          0%, 35% { transform: rotateY(0deg); }
          50%, 85% { transform: rotateY(180deg); }
          100% { transform: rotateY(360deg); }
        }
        
        /* Shimmer effect that sweeps across text */
        @keyframes textShimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }

        .scene {
          width: 900px; height: 450px;
          perspective: 3000px;
          display: flex; justify-content: center; align-items: center;
          background: #000000;
          overflow: hidden;
        }

        .phone-body {
          width: 780px; height: 340px;
          position: relative;
          transform-style: preserve-3d;
          animation: ultraFlip 30s cubic-bezier(0.645, 0.045, 0.355, 1) infinite;
        }

        .face {
          position: absolute; inset: 0;
          backface-visibility: hidden;
          border-radius: 35px;
          box-sizing: border-box;
          border: 1.5px solid #666; 
          box-shadow: 0 0 15px rgba(88, 166, 255, 0.3);
        }

        .front {
          background: #0d1117;
          z-index: 2;
          transform: translateZ(20px); 
          border: 14px solid #2e3035;
          outline: 2.5px solid #777;
        }

        .back {
          background: linear-gradient(145deg, #2a2c32, #16171b);
          transform: rotateY(180deg) translateZ(20px);
          border: 14px solid #2e3035;
          outline: 2.5px solid #777;
        }

        /* Shine Typography */
        .shine-text {
          background: linear-gradient(120deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 70%);
          background-size: 200% 100%;
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: textShimmer 4s linear infinite;
        }

        .content { 
          padding: 30px 45px 30px 95px; height: 100%; display: flex; 
          flex-direction: column; justify-content: center; 
          font-family: 'Inter', -apple-system, sans-serif;
        }

        h1 { font-size: 32px; margin: 0; font-weight: 900; letter-spacing: -0.5px; }
        .role { color: #58a6ff; font-weight: 700; font-size: 14px; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .text-bio { color: #ffffff; line-height: 1.7; margin-top: 15px; font-size: 14.5px; opacity: 0.95; }
        .highlight { color: #58a6ff; font-weight: 800; }

        .back-display { 
          position: absolute; left: 195px; right: 15px; top: 15px; bottom: 15px; 
          background: #080a0d; border-radius: 22px; padding: 25px; 
          border: 1px solid #444;
          display: flex; flex-direction: column;
        }

        .skills-grid {
          display: grid; grid-template-columns: repeat(4, 1fr);
          gap: 18px; margin-top: 20px;
        }

        .skill-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .skill-item img { width: 34px; height: 34px; }
        .skill-item span { color: #ffffff; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .cam-block {
          position: absolute; left: 15px; top: 50%; transform: translateY(-50%) translateZ(12px);
          width: 160px; height: 270px;
          background: #0d0e10; border-radius: 40px; border: 2px solid #444;
          display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
        }
        .lens { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a2e38, #000); border: 3px solid #3a3d46; }
      </style>

      <div class="scene">
        <div class="phone-body">
          <div class="face front">
            <div class="content">
              <h1 class="shine-text">Hi, I'm Suyash Mathur</h1>
              <div class="role">Android Developer | AI &amp; ML | DSA Learner</div>
              <p class="text-bio">
                I’m a passionate developer who enjoys building <span class="highlight">mobile applications</span> and exploring the world of <span class="highlight">Artificial Intelligence</span>. 
                I love turning ideas into real applications and constantly improving my problem-solving skills through <span class="highlight">Data Structures and Algorithms</span>.
              </p>
            </div>
          </div>

          <div class="face back">
            <div class="cam-block">
              <div class="lens"></div>
              <div class="lens" style="width:50px; height:50px;"></div>
              <div class="lens" style="width:40px; height:40px;"></div>
            </div>
            <div class="back-display">
               <div class="shine-text" style="font-size: 16px; font-weight: 900; letter-spacing: 1.5px; border-bottom: 2px solid #58a6ff; width: fit-content; padding-bottom: 5px;">
                 TECH STACK
               </div>
               <div class="skills-grid">
                 <div class="skill-item"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/java/java-original.svg" alt="Java"/><span>JAVA</span></div>
                 <div class="skill-item"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/python/python-original.svg" alt="Python"/><span>PYTHON</span></div>
                 <div class="skill-item"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/c/c-original.svg" alt="C"/><span>C</span></div>
                 <div class="skill-item"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/cplusplus/cplusplus-original.svg" alt="C++"/><span>C++</span></div>
                 <div class="skill-item"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/androidstudio/androidstudio-original.svg" alt="Android Studio"/><span>ANDROID</span></div>
                 <div class="skill-item"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/firebase/firebase-plain.svg" alt="Firebase"/><span>FIREBASE</span></div>
                 <div class="skill-item"><img src="https://upload.wikimedia.org/wikipedia/commons/2/21/Matlab_Logo.png" alt="MATLAB"/><span>MATLAB</span></div>
               </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
