<svg fill="none" viewBox="0 0 800 450" width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          width: 800px;
          height: 450px;
          background: transparent;
          display: flex;
          align-items: center;
          justify-content: center;
          perspective: 1000px;
          font-family: 'Inter', -apple-system, sans-serif;
        }

        .phone-card {
          width: 580px;
          height: 340px; /* Increased height slightly */
          position: relative;
          transform-style: preserve-3d;
          animation: flip 8s infinite ease-in-out;
        }

        @keyframes flip {
          0%, 45% { transform: rotateY(0deg); }
          55%, 100% { transform: rotateY(180deg); }
        }

        .face {
          position: absolute;
          width: 100%;
          height: 100%;
          backface-visibility: hidden;
          border-radius: 35px;
          border: 3px solid #30363d;
          display: flex;
          flex-direction: column;
          justify-content: center; /* Keeps everything vertically centered */
          box-sizing: border-box;
          overflow: hidden;
        }

        .front {
          background: #161b22;
          padding: 20px 40px; /* Reduced vertical padding */
          text-align: center;
        }

        .back {
          background: #0d1117;
          transform: rotateY(180deg);
          padding: 20px 20px 20px 95px; 
          align-items: center;
        }

        .cam-block {
          position: absolute;
          left: 15px;
          top: 50%;
          transform: translateY(-50%);
          width: 55px;
          height: 260px;
          background: #080a0d;
          border-radius: 25px;
          border: 2px solid #30363d;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: space-around;
          padding: 10px 0;
        }

        .lens {
          width: 32px;
          height: 32px;
          border-radius: 50%;
          background: radial-gradient(circle at 30% 30%, #2a2e38, #000);
          border: 2px solid #444;
        }

        .title { font-size: 26px; font-weight: 900; color: #ffffff; margin: 0; }
        .highlight { color: #58a6ff; }
        
        .sub-role {
          color: #8b949e;
          font-size: 11px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1px;
          margin: 8px 0;
        }

        .bio-text { 
          color: #c9d1d9; 
          font-size: 13px; 
          line-height: 1.5; 
          margin: 0;
          font-weight: 400;
        }

        .stats-badge {
          display: inline-block;
          margin-top: 15px;
          background: rgba(88, 166, 255, 0.1);
          color: #58a6ff;
          padding: 4px 12px;
          border-radius: 20px;
          font-size: 10px;
          font-weight: 800;
          border: 1px solid rgba(88, 166, 255, 0.3);
          text-transform: uppercase;
        }

        .skills-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 15px;
          width: 100%;
        }

        .skill-item {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 5px;
        }

        .skill-item img { width: 30px; height: 30px; }
        .skill-item span { color: #c9d1d9; font-size: 10px; font-weight: 600; }
      </style>

      <div class="container">
        <div class="phone-card">
          <div class="face front">
            <h1 class="title">About <span class="highlight">Me</span></h1>
            <div class="sub-role">Android Developer | AI &amp; ML | DSA Learner</div>
            <p class="bio-text">
              I’m a passionate developer who enjoys building <span class="highlight">mobile applications</span> and exploring AI. 
              I love turning ideas into reality and improving my problem-solving skills through DSA.
            </p>
            <div class="stats-badge">Solved 200+ LeetCode Problems</div>
          </div>

          <div class="face back">
            <div class="cam-block">
              <div class="lens"></div>
              <div class="lens"></div>
              <div class="lens"></div>
            </div>
            <div class="skills-grid">
              <div class="skill-item">
                <img src="https://cdn.simpleicons.org/python" alt="Python" />
                <span>Python</span>
              </div>
              <div class="skill-item">
                <img src="https://cdn.simpleicons.org/java" alt="Java" />
                <span>Java</span>
              </div>
              <div class="skill-item">
                <img src="https://cdn.simpleicons.org/c" alt="C" />
                <span>C</span>
              </div>
              <div class="skill-item">
                <img src="https://cdn.simpleicons.org/cplusplus" alt="C++" />
                <span>C++</span>
              </div>
              <div class="skill-item">
                <img src="https://cdn.simpleicons.org/firebase" alt="Firebase" />
                <span>Firebase</span>
              </div>
              <div class="skill-item">
                <img src="https://cdn.simpleicons.org/androidstudio" alt="Android Studio" />
                <span>Android</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
