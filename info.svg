<svg width="1000" height="500" viewBox="0 0 1000 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap');
    
    /* Subtle floating animation to emphasize the 3D effect */
    .mobile-frame {
      animation: float 8s infinite ease-in-out;
      transform-origin: 500px 250px;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(15px, -10px); }
    }

    .text { font-family: 'Inter', sans-serif; fill: white; }
    .title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
    .blue { fill: #58a6ff; }
    .dim { fill: #8b949e; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .bio { fill: #c9d1d9; font-size: 15px; line-height: 1.6; font-weight: 400; }
    .stack-header { fill: white; font-size: 18px; font-weight: 800; letter-spacing: 1px; }
    .skill-text { fill: #c9d1d9; font-size: 12px; font-weight: 600; }
  </style>

  <g class="mobile-frame">
    <rect x="75" y="75" width="850" height="350" rx="40" fill="#010409" stroke="#30363d" stroke-width="4"/>
    <rect x="80" y="80" width="840" height="340" rx="35" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    
    <rect x="95" y="95" width="810" height="310" rx="28" fill="#010409" stroke="#161b22" stroke-width="2"/>

    <ellipse cx="125" cy="250" rx="8" ry="8" fill="#0d1117" stroke="#444"/>
    <circle cx="125" cy="250" r="5" fill="black"/>

    <g transform="translate(160, 120)">
      <text x="0" y="0" class="text title">About <tspan class="blue">Me</tspan></text>
      <text x="0" y="28" class="text dim">Android Developer | AI &amp; ML | DSA Learner</text>
      
      <text x="0" y="65" class="text bio">I’m a passionate developer who enjoys building</text>
      <text x="0" y="90" class="text bio">mobile applications and exploring the world</text>
      <text x="0" y="115" class="text bio">of Artificial Intelligence. I love turning ideas</text>
      <text x="0" y="140" class="text bio">into real applications and improving my DSA</text>
      <text x="0" y="165" class="text bio">problem-solving skills.</text>

      <rect x="0" y="200" width="280" height="35" rx="17.5" fill="#58a6ff" fill-opacity="0.1" stroke="#58a6ff" stroke-opacity="0.3"/>
      <text x="140" y="222" text-anchor="middle" class="text blue" style="font-size: 12px; font-weight: 800;">SOLVED 200+ LEETCODE PROBLEMS</text>
    </g>

    <line x1="560" y1="120" x2="560" y2="380" stroke="#161b22" stroke-width="2"/>

    <g transform="translate(600, 120)">
      <text x="0" y="0" class="text stack-header">Tech <tspan class="blue">Stack</tspan></text>
      
      <g transform="translate(0, 30)">
        <image href="https://cdn.simpleicons.org/python/58a6ff" x="0" y="0" width="30" height="30"/>
        <text x="40" y="22" class="text skill-text">Python</text>

        <image href="https://cdn.simpleicons.org/java/58a6ff" x="140" y="0" width="30" height="30"/>
        <text x="180" y="22" class="text skill-text">Java</text>

        <image href="https://cdn.simpleicons.org/c/58a6ff" x="0" y="60" width="30" height="30"/>
        <text x="40" y="82" class="text skill-text">C Language</text>

        <image href="https://cdn.simpleicons.org/cplusplus/58a6ff" x="140" y="60" width="30" height="30"/>
        <text x="180" y="82" class="text skill-text">C++</text>

        <image href="https://cdn.simpleicons.org/firebase/58a6ff" x="0" y="120" width="30" height="30"/>
        <text x="40" y="142" class="text skill-text">Firebase</text>

        <image href="https://cdn.simpleicons.org/androidstudio/58a6ff" x="140" y="120" width="30" height="30"/>
        <text x="180" y="142" class="text skill-text">Android</text>
      </g>
    </g>
  </g>
</svg>

